<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강아지 & 고양이 갤러리</title>
    <style>
        body {
            font-family: 'Pretendard', 'Nanum Gothic', sans-serif;
            background-color: #fff9f0; /* 따뜻한 미색 배경 */
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 40px 20px;
        }

        h1 {
            color: #ff9f43;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #888;
            margin-bottom: 40px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #ff9f43;
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .info {
            padding: 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
        }

        .tag {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        .tag-dog { background-color: #e3f2fd; color: #1976d2; }
        .tag-cat { background-color: #fce4ec; color: #d81b60; }
    </style>
</head>
<body>

    <h1>🐾 귀여운 친구들</h1>
    <p>강아지와 고양이가 기다리고 있어요!</p>

    <div class="gallery">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?auto=format&fit=crop&w=600&q=80" alt="강아지">
            <div class="info">
                <span class="tag tag-dog">DOG</span><br>멋쟁이 골든 리트리버
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1537151608828-ea2b11777ee8?auto=format&fit=crop&w=600&q=80" alt="강아지">
            <div class="info">
                <span class="tag tag-dog">DOG</span><br>호기심 많은 웰시코기
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1511044568932-338cba0ad803?auto=format&fit=crop&w=600&q=80" alt="고양이">
            <div class="info">
                <span class="tag tag-cat">CAT</span><br>나른한 오후의 고양이
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1533738363-b7f9aef128ce?auto=format&fit=crop&w=600&q=80" alt="고양이">
            <div class="info">
                <span class="tag tag-cat">CAT</span><br>선글라스 쓴 힙한 고양이
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1495360010541-f48722b34f7d?auto=format&fit=crop&w=600&q=80" alt="고양이">
            <div class="info">
                <span class="tag tag-cat">CAT</span><br>초롱초롱한 눈망울냥
            </div>
        </div>
    </div>

</body>
</html>
